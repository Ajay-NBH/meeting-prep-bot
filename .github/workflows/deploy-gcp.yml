name: Deploy Real-Time Bot to GCP

on:
  push:
    branches:
      - main # Deploys automatically when you push to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Create Secure .env File
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NBH_GDRIVE_FOLDER_ID: ${{ secrets.NBH_GDRIVE_FOLDER_ID }}
        ADMIN_EMAIL_FOR_NOTIFICATIONS: ${{ secrets.ADMIN_EMAIL_FOR_NOTIFICATIONS }}
        CRED: ${{ secrets.GOOGLE_CREDENTIALS_JSON_CONTENT }}
        CAL: ${{ secrets.GOOGLE_TOKEN_CALENDAR_JSON }}
        GMAIL: ${{ secrets.GOOGLE_TOKEN_GMAIL_JSON }}
        DRIVE: ${{ secrets.GOOGLE_TOKEN_DRIVE_JSON }}
        SHEETS: ${{ secrets.GOOGLE_TOKEN_SHEETS_JSON }}
        DOCS: ${{ secrets.GOOGLE_TOKEN_DOCS_JSON }}
      run: |
        python -c '
        import os, json
        
        def clean(val):
            if not val: return ""
            try:
                # This flattens the JSON safely into a single line
                return json.dumps(json.loads(val))
            except:
                return val.strip()

        with open(".env", "w") as f:
            f.write("GOOGLE_CLOUD_PROJECT=" + os.environ.get("GCP_PROJECT_ID", "") + "\n")
            f.write("PUBSUB_TOPIC_ID=calendar-updates\n")
            f.write("CI=true\n")
            f.write("GEMINI_API_KEY=" + os.environ.get("GEMINI_API_KEY", "") + "\n")
            f.write("NBH_GDRIVE_FOLDER_ID=" + os.environ.get("NBH_GDRIVE_FOLDER_ID", "") + "\n")
            f.write("ADMIN_EMAIL_FOR_NOTIFICATIONS=" + os.environ.get("ADMIN_EMAIL_FOR_NOTIFICATIONS", "") + "\n")
            f.write("GOOGLE_CREDENTIALS_JSON_CONTENT=" + clean(os.environ.get("CRED")) + "\n")
            f.write("GOOGLE_TOKEN_JSON_CALENDAR=" + clean(os.environ.get("CAL")) + "\n")
            f.write("GOOGLE_TOKEN_JSON_GMAIL=" + clean(os.environ.get("GMAIL")) + "\n")
            f.write("GOOGLE_TOKEN_JSON_DRIVE=" + clean(os.environ.get("DRIVE")) + "\n")
            f.write("GOOGLE_TOKEN_JSON_SHEETS=" + clean(os.environ.get("SHEETS")) + "\n")
            f.write("GOOGLE_TOKEN_JSON_DOCS=" + clean(os.environ.get("DOCS")) + "\n")
        '

    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bot-repo/nbh-bot:latest
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: nbh-meeting-bot
        region: us-central1
        image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bot-repo/nbh-bot:latest
        timeout: 3600
