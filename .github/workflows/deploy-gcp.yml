name: Deploy Real-Time Bot to GCP

on:
  push:
    branches:
      - main # Deploys automatically when you push to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Write Secret Files
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS_JSON_CONTENT }}' > credentials.json
        echo '${{ secrets.GOOGLE_TOKEN_CALENDAR_JSON }}' > calendar_token.json
        echo '${{ secrets.GOOGLE_TOKEN_GMAIL_JSON }}' > gmail_token.json
        echo '${{ secrets.GOOGLE_TOKEN_DRIVE_JSON }}' > drive_token.json
        echo '${{ secrets.GOOGLE_TOKEN_SHEETS_JSON }}' > sheets_token.json
        echo '${{ secrets.GOOGLE_TOKEN_DOCS_JSON }}' > docs_token.json
      run: |
        cat <<< "$CRED" > credentials.json
        cat <<< "$CAL" > calendar_token.json
        cat <<< "$GMAIL" > gmail_token.json
        cat <<< "$DRIVE" > drive_token.json
        cat <<< "$SHEETS" > sheets_token.json
        cat <<< "$DOCS" > docs_token.json

    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bot-repo/nbh-bot:latest
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: nbh-meeting-bot
        region: us-central1
        image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bot-repo/nbh-bot:latest
        timeout: 3600
        env_vars: |-
          GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
          PUBSUB_TOPIC_ID=calendar-updates
          CI=false
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          NBH_GDRIVE_FOLDER_ID=${{ secrets.NBH_GDRIVE_FOLDER_ID }}
          ADMIN_EMAIL_FOR_NOTIFICATIONS=${{ secrets.ADMIN_EMAIL_FOR_NOTIFICATIONS }}
          CALENDAR_TOKEN=calendar_token.json
          GMAIL_TOKEN=gmail_token.json
          DRIVE_TOKEN=drive_token.json
          SHEET_TOKEN=sheets_token.json
          DOCS_TOKEN=docs_token.json
          GOOGLE_CREDENTIALS_FILE=credentials.json
